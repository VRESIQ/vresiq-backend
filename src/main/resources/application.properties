# ===============================
# SERVER CONFIGURATION
# ===============================
server.port=8081

# ===============================
# MONGODB CONFIGURATION
# ===============================
spring.data.mongodb.uri=${MONGO_URI}

# ===============================
# MAIL CONFIGURATION
# ===============================
spring.mail.host=smtp-relay.brevo.com
spring.mail.port=587
spring.mail.username=${VRESIQ_MAIL_USERNAME:${MAIL_USERNAME}}
spring.mail.password=${VRESIQ_MAIL_PASSWORD:${MAIL_PASSWORD}}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.protocol=smtp
spring.mail.properties.mail.smtp.from=${MAIL_FROM:admin@vresiq.app}

# ===============================
# APPLICATION INFO
# ===============================
app.frontend.url=${FRONTEND_URL:http://localhost:5173}

# ===============================
# CLOUDINARY CONFIGURATION
# ===============================
cloudinary.cloud-name=${CLOUD_NAME}
cloudinary.api-key=${CLOUD_KEY}
cloudinary.api-secret=${CLOUD_SECRET}

# ===============================
# JWT CONFIGURATION
# ===============================
jwt.secret=${JWT_SECRET}
jwt.expiration=900000
jwt.refresh-expiration=604800000

# ===============================
# RAZORPAY CONFIGURATION
# ===============================
razorpay.key.id=${RAZORPAY_KEY_ID}
razorpay.key.secret=${RAZORPAY_KEY_SECRET}

AI_API_KEY=${AI_API_KEY}
GEMINI_API_KEY=${GEMINI_API_KEY}

# Enable auto-index creation for @Indexed annotations
spring.data.mongodb.auto-index-creation=true

# ===============================
# DATABASE SEEDER CONFIGURATION
# ===============================
seed.admin.email=${SEED_ADMIN_EMAIL:}
seed.admin.password=${SEED_ADMIN_PASSWORD:}
