# ===============================
# SERVER CONFIGURATION
# ===============================
server.port=8081

# ===============================
# MONGODB CONFIGURATION
# ===============================
spring.data.mongodb.uri=${MONGO_URI}

# ===============================
# MAIL CONFIGURATION
# ===============================
spring.mail.host=smtp-relay.brevo.com
spring.mail.port=587
management.health.mail.enabled=false
spring.mail.username=${VRESIQ_MAIL_USERNAME:${MAIL_USERNAME}}
spring.mail.password=${VRESIQ_MAIL_PASSWORD:${MAIL_PASSWORD}}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.protocol=smtp
spring.mail.properties.mail.smtp.from=${MAIL_FROM:admin@vresiq.app}

# ===============================
# APPLICATION INFO
# ===============================
app.frontend.cors-origins=${FRONTEND_URL:http://localhost:5173}
app.frontend.public-url=${FRONTEND_PUBLIC_URL:${app.frontend.cors-origins}}

# Fail fast on blocked/unreachable SMTP routes instead of hanging for ~2 minutes
spring.mail.properties.mail.smtp.connectiontimeout=${MAIL_SMTP_CONNECTION_TIMEOUT_MS:10000}
spring.mail.properties.mail.smtp.timeout=${MAIL_SMTP_TIMEOUT_MS:10000}
spring.mail.properties.mail.smtp.writetimeout=${MAIL_SMTP_WRITE_TIMEOUT_MS:10000}

# ===============================
# CLOUDINARY CONFIGURATION
# ===============================
cloudinary.cloud-name=${CLOUD_NAME}
cloudinary.api-key=${CLOUD_KEY}
cloudinary.api-secret=${CLOUD_SECRET}

# ===============================
# JWT CONFIGURATION
# ===============================
jwt.secret=${JWT_SECRET}
jwt.expiration=900000
jwt.refresh-expiration=604800000

# ===============================
# RAZORPAY CONFIGURATION
# ===============================
razorpay.key.id=${RAZORPAY_KEY_ID}
razorpay.key.secret=${RAZORPAY_KEY_SECRET}
razorpay.webhook.secret=${RAZORPAY_WEBHOOK_SECRET:}



# Enable auto-index creation for @Indexed annotations
spring.data.mongodb.auto-index-creation=true

# ===============================
# DATABASE SEEDER CONFIGURATION
# ===============================
seed.admin.email=${SEED_ADMIN_EMAIL:}
seed.admin.password=${SEED_ADMIN_PASSWORD:}
