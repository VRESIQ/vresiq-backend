name: Backend Keep-Warm

on:
  schedule:
    - cron: '*/12 * * * *'
  workflow_dispatch: {}

jobs:
  ping-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Health Endpoint
        run: |
          echo "Initiating keep-warm request..."
          curl -s -o /dev/null -w "Response Status: %{http_code}\n" \
            --connect-timeout 15 \
            --max-time 30 \
            --retry 3 \
            --retry-delay 5 \
            https://vresiq-backend.onrender.com/actuator/health
